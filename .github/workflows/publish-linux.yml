name: Publish Python 🐍 distributions 📦

on:
  push:
    branches: [ linux-workflow ]


jobs:
  build-n-publish:
    name: Build and publish Python 🐍 distributions 📦
    runs-on: ubuntu-20.04

    strategy:
      matrix:
        python-version: [ '3.10.0', '3.11.0', '3.12.0' ]
        architecture: [ 'x64' ]
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}

      - name: Install pypa/build
        run: python -m pip install build
      
      - name: Install denpendencies
        run: sudo apt install mesa-common-dev libgl1-mesa-dev libglu1-mesa-dev

      - name: Build a binary wheel
        run: python -m build --wheel . --outdir dist/
      
      - name: Repair for manylinux
        run: |
          python -m pip install auditwheel
          python -m auditwheel repair dist/* -w wheelhouse

      - name: Install twine
        run: python -m pip install twine

      - name: Publish distribution to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: twine upload wheelhouse/* --skip-existing

      - name: Get the filenames
        id: get_filenames
        run: |
          wheel=$(find wheelhouse -maxdepth 1 -name "*.whl" -print -quit)
          echo "::set-output name=WHEEL_FILE::$wheel"

      - name: Upload Wheel to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.0
          files: |
            ${{ steps.get_filenames.outputs.WHEEL_FILE }}

    